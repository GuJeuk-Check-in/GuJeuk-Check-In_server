services:
  app:
    image: ${APP_IMAGE:-gujeuk-check-in-server:latest}
    container_name: ${APP_CONTAINER_NAME:-gujeuk-app}
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL:?DB_URL is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      PROD_BASE_URL: ${PROD_BASE_URL:?PROD_BASE_URL is required}
      STAG_BASE_URL: ${STAG_BASE_URL:?STAG_BASE_URL is required}
      VERCEL_URL: ${VERCEL_URL:?VERCEL_URL is required}
      TEST_URL: ${TEST_URL:?TEST_URL is required}
      JAVA_OPTS: ${JAVA_OPTS:--Xms64m -Xmx128m}
      SPRING_JPA_SHOW_SQL: "false"
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: warn
      LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND: warn
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_DATA_REDIS: warn
      LOGGING_LEVEL_IO_LETTUCE_CORE: warn
    ports:
      - "${APP_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: ${MYSQL_CONTAINER_NAME:-gujeuk-mysql}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: ${REDIS_CONTAINER_NAME:-gujeuk-redis}
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
    name: ${MYSQL_VOLUME_NAME:-gujeuk-check-in-server_mysql_data}
  redis_data:
    name: ${REDIS_VOLUME_NAME:-gujeuk-check-in-server_redis_data}
