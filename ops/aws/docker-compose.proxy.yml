services:
  caddy:
    image: caddy:2-alpine
    container_name: gujeuk-aws-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
    name: gujeuk-aws-caddy-data
  caddy_config:
    name: gujeuk-aws-caddy-config
