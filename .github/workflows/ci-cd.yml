name: Gujeuk CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gujeuk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify build
        run: ./gradlew clean build -x test

  deploy-home:
    name: Deploy Home Server
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, gujeuk-home-server]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync source to deployment directory
        run: |
          set -euo pipefail

          DEPLOY_DIR=/home/ubuntu/git/gujeuk-check-in-server
          mkdir -p "$DEPLOY_DIR"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='.env.backup.*' \
            --exclude='backups/' \
            --exclude='imports/' \
            --exclude='build/' \
            --exclude='.gradle/' \
            ./ "$DEPLOY_DIR"/

      - name: Validate deployment environment
        run: |
          set -euo pipefail

          DEPLOY_DIR=/home/ubuntu/git/gujeuk-check-in-server
          test -f "$DEPLOY_DIR/.env"
          docker --version
          docker compose version

      - name: Install home server recovery scripts
        run: |
          set -euo pipefail

          install -m 0755 \
            ops/home-server/start-cloudflared.sh \
            /home/ubuntu/bin/start-cloudflared.sh
          install -m 0755 \
            ops/home-server/watch-cloudflared.sh \
            /home/ubuntu/bin/watch-cloudflared.sh
          install -m 0755 \
            ops/home-server/server-shutdown \
            /home/ubuntu/bin/server-shutdown
          install -m 0755 \
            ops/home-server/gujeuk-rtcwake \
            /home/ubuntu/bin/gujeuk-rtcwake
          install -m 0755 \
            ops/home-server/install-shutdown-nopasswd.sh \
            /home/ubuntu/bin/install-shutdown-nopasswd.sh
          install -m 0755 \
            ops/home-server/notify-server-resumed \
            /home/ubuntu/bin/notify-server-resumed
          ln -sfn \
            /home/ubuntu/bin/server-shutdown \
            /home/ubuntu/bin/shutdown

      - name: Build application image
        run: |
          set -euo pipefail

          cd /home/ubuntu/git/gujeuk-check-in-server
          docker compose build app

      - name: Deploy application
        run: |
          set -euo pipefail

          cd /home/ubuntu/git/gujeuk-check-in-server
          docker compose up -d app

      - name: Health check
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if curl -fsS http://localhost:8080/purpose/all >/dev/null; then
              echo "local health check passed"
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "local health check failed"
              docker compose -f /home/ubuntu/git/gujeuk-check-in-server/docker-compose.yml logs --tail=200 app
              exit 1
            fi

            sleep 2
          done

          curl -fsS https://api.taisu.site/purpose/all >/dev/null
          echo "public health check passed"

      - name: Prune unused Docker images
        if: always()
        run: docker image prune -f

  notify-home-discord:
    name: Notify Home Discord
    needs: [build, deploy-home]
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: [self-hosted, gujeuk-home-server]

    steps:
      - name: Send Korean Discord notification
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy-home.result }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ ! -x /home/ubuntu/bin/discord-notify ]; then
            echo "/home/ubuntu/bin/discord-notify is not installed; skipping Discord notification."
            exit 0
          fi

          translate_result() {
            case "$1" in
              success) echo "성공" ;;
              failure) echo "실패" ;;
              cancelled) echo "취소됨" ;;
              skipped) echo "건너뜀" ;;
              *) echo "$1" ;;
            esac
          }

          BUILD_RESULT_KO="$(translate_result "$BUILD_RESULT")"
          DEPLOY_RESULT_KO="$(translate_result "$DEPLOY_RESULT")"
          COMMIT_SHORT="${SHA:0:7}"

          if [ "$BUILD_RESULT" != "success" ]; then
            TITLE="🚨 긴급: 구즉 CI 빌드 실패"
            COLOR=15158332
            REFLECT_RESULT="실패"
            SUMMARY="커밋이 홈서버에 반영되지 않았습니다. 빌드 단계에서 실패했습니다."
          elif [ "$REF_NAME" = "main" ] && [ "$EVENT_NAME" = "push" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            TITLE="구즉 CI/CD 커밋 반영 완료"
            COLOR=3066993
            REFLECT_RESULT="완료"
            SUMMARY="커밋이 홈서버에 정상 반영되었습니다."
          elif [ "$REF_NAME" = "main" ] && [ "$EVENT_NAME" = "push" ]; then
            TITLE="🚨 긴급: 구즉 CI/CD 커밋 반영 실패"
            COLOR=15158332
            REFLECT_RESULT="실패"
            SUMMARY="빌드는 성공했지만 홈서버 배포 중 문제가 발생해 커밋이 반영되지 않았습니다."
          else
            TITLE="구즉 CI 검사 완료"
            COLOR=3447003
            REFLECT_RESULT="배포 대상 아님"
            SUMMARY="CI 빌드는 통과했지만 main 브랜치 push가 아니어서 홈서버 반영은 진행하지 않았습니다."
          fi

          MESSAGE="$(cat <<MSG
          $SUMMARY

          커밋 반영: $REFLECT_RESULT
          브랜치: $REF_NAME
          커밋: $COMMIT_SHORT
          실행자: $ACTOR
          빌드: $BUILD_RESULT_KO
          배포: $DEPLOY_RESULT_KO
          저장소: $REPOSITORY
          Actions: $RUN_URL
          MSG
          )"

          /home/ubuntu/bin/discord-notify "$TITLE" "$MESSAGE" "$COLOR" || true
