name: Gujeuk CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gujeuk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify build
        run: ./gradlew clean build -x test

  deploy-home:
    name: Deploy Home Server
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, gujeuk-home-server]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync source to deployment directory
        run: |
          set -euo pipefail

          DEPLOY_DIR=/home/ubuntu/git/gujeuk-check-in-server
          mkdir -p "$DEPLOY_DIR"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='.env.backup.*' \
            --exclude='backups/' \
            --exclude='imports/' \
            --exclude='build/' \
            --exclude='.gradle/' \
            ./ "$DEPLOY_DIR"/

      - name: Validate deployment environment
        run: |
          set -euo pipefail

          DEPLOY_DIR=/home/ubuntu/git/gujeuk-check-in-server
          test -f "$DEPLOY_DIR/.env"
          docker --version
          docker compose version

      - name: Build application image
        run: |
          set -euo pipefail

          cd /home/ubuntu/git/gujeuk-check-in-server
          docker compose build app

      - name: Deploy application
        run: |
          set -euo pipefail

          cd /home/ubuntu/git/gujeuk-check-in-server
          docker compose up -d app

      - name: Health check
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if curl -fsS http://localhost:8080/purpose/all >/dev/null; then
              echo "local health check passed"
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "local health check failed"
              docker compose -f /home/ubuntu/git/gujeuk-check-in-server/docker-compose.yml logs --tail=200 app
              exit 1
            fi

            sleep 2
          done

          curl -fsS https://api.taisu.site/purpose/all >/dev/null
          echo "public health check passed"

      - name: Prune unused Docker images
        if: always()
        run: docker image prune -f

  notify-discord:
    name: Notify Discord
    needs: [build, deploy-home]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy-home.result }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set; skipping Discord notification."
            exit 0
          fi

          STATUS="성공"
          COLOR=3066993
          TITLE="구즉 CI/CD 배포 성공"

          if [ "$BUILD_RESULT" != "success" ] || { [ "$DEPLOY_RESULT" != "success" ] && [ "$DEPLOY_RESULT" != "skipped" ]; }; then
            STATUS="실패"
            COLOR=15158332
            TITLE="🚨 긴급: 구즉 CI/CD 배포 실패"
          fi

          export STATUS COLOR TITLE

          python3 - <<'PY' > /tmp/discord-payload.json
          import json
          import os

          sha = os.environ["SHA"]
          deploy_result = os.environ["DEPLOY_RESULT"]
          deploy_result_ko = {
              "success": "성공",
              "failure": "실패",
              "cancelled": "취소됨",
              "skipped": "건너뜀(main 브랜치가 아니거나 PR)",
          }.get(deploy_result, deploy_result)
          build_result_ko = {
              "success": "성공",
              "failure": "실패",
              "cancelled": "취소됨",
              "skipped": "건너뜀",
          }.get(os.environ["BUILD_RESULT"], os.environ["BUILD_RESULT"])

          description = (
              "구즉 온프레미스 서버 배포가 정상 완료되었습니다."
              if os.environ["STATUS"] == "성공"
              else "구즉 온프레미스 서버 배포에 문제가 발생했습니다. 즉시 GitHub Actions 로그를 확인해주세요."
          )

          payload = {
              "username": "구즉 CI/CD",
              "embeds": [
                  {
                      "title": os.environ["TITLE"],
                      "description": description,
                      "url": os.environ["RUN_URL"],
                      "color": int(os.environ["COLOR"]),
                      "fields": [
                          {"name": "상태", "value": os.environ["STATUS"], "inline": True},
                          {"name": "브랜치", "value": os.environ["REF_NAME"], "inline": True},
                          {"name": "이벤트", "value": os.environ["EVENT_NAME"], "inline": True},
                          {"name": "빌드", "value": build_result_ko, "inline": True},
                          {"name": "배포", "value": deploy_result_ko, "inline": True},
                          {"name": "실행자", "value": os.environ["ACTOR"], "inline": True},
                          {"name": "커밋", "value": sha[:7], "inline": True},
                          {"name": "저장소", "value": os.environ["REPOSITORY"], "inline": True},
                      ],
                  }
              ],
          }

          print(json.dumps(payload, ensure_ascii=False))
          PY

          curl -fsS \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @/tmp/discord-payload.json \
            "$DISCORD_WEBHOOK_URL"
