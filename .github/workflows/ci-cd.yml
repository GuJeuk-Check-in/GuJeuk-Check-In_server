name: Gujeuk CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/gujeuk-check-in

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Verify build (no test)
        run: ./gradlew build -x test

  docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-prod:
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy PROD to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/gujeuk

            docker pull ${{ env.IMAGE_NAME }}:main

            docker compose up -d prod-app --no-deps --force-recreate

            docker image prune -f

  deploy-stag:
    needs: docker
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy STAG compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.stag.yml
          target: /home/${{ secrets.EC2_USER }}/stag-gujeuk-check-in-server

      - name: Deploy STAG to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /home/${{ secrets.EC2_USER }}/stag-gujeuk-check-in-server
            cd /home/${{ secrets.EC2_USER }}/stag-gujeuk-check-in-server

            cat > .env.stag <<EOF
            APP_IMAGE=${{ env.IMAGE_NAME }}:develop
            APP_PORT=${{ secrets.STAG_APP_PORT }}
            DB_URL=jdbc:mysql://stag-mysql:3306/${{ secrets.STAG_MYSQL_DATABASE }}?serverTimezone=Asia/Seoul
            JAVA_OPTS=${{ secrets.STAG_JAVA_OPTS }}
            JWT_SECRET_KEY=${{ secrets.STAG_JWT_SECRET_KEY }}
            MYSQL_DATABASE=${{ secrets.STAG_MYSQL_DATABASE }}
            MYSQL_PASSWORD=${{ secrets.STAG_MYSQL_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.STAG_MYSQL_ROOT_PASSWORD }}
            MYSQL_USER=${{ secrets.STAG_MYSQL_USER }}
            PROD_BASE_URL=${{ secrets.PROD_BASE_URL }}
            REDIS_HOST=stag-redis
            REDIS_PORT=6379
            STAG_BASE_URL=${{ secrets.STAG_BASE_URL }}
            TEST_URL=${{ secrets.TEST_URL }}
            VERCEL_URL=${{ secrets.VERCEL_URL }}
            EOF

            docker pull ${{ env.IMAGE_NAME }}:develop

            docker compose -f docker-compose.stag.yml up -d --force-recreate

            docker image prune -f
